<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iman AI - Intelligent Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">

    <div id="loginOverlay">
        <div class="login-card" id="loginCard">
            <div style="font-size: 40px; margin-bottom: 10px;">🦅</div>
            <h2>Iman AI</h2>
            <p>Sistem Asisten Pintar</p>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="uIn" class="login-input" placeholder="User">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="pIn" class="login-input" placeholder="••••">
            </div>
            <button class="btn-login" onclick="doLogin()">Masuk</button>
        </div>
    </div>

    <div id="chatApp">
        <nav class="navbar">
            <div class="brand"><span>🦅 IMAN AI</span></div>
            <button class="theme-toggle" id="themeSwitch">Mode Terang</button>
        </nav>

        <div class="chat-container" id="msgBox">
            <div class="message bot">
                <div class="bubble">Halo **Iman**! Saya asisten Biru Anda. Apa yang ingin Anda diskusikan hari ini?</div>
            </div>
        </div>

        <div class="input-bar">
            <div class="input-box">
                <textarea id="msgInput" placeholder="Ketik sesuatu..." rows="1"></textarea>
                <button class="btn-send" id="sendBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
